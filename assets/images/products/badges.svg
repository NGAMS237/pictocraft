  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DB2777" stop-opacity="1"/>
      <stop offset="100%" stop-color="#DB2777" stop-opacity="0.7"/>
    </linearGradient>
    <pattern id="p" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white" opacity="0.15"/>
