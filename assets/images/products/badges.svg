  <text x="200" y="150" font-size="90" text-anchor="middle" dominant-baseline="central">🎖️</text>
  <text x="200" y="240" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="white" letter-spacing="0.5">Badges</text>
  <text x="200" y="270" font-family="'Manrope', system-ui, sans-serif" font-size="11" text-anchor="middle" fill="white" opacity="0.7" letter-spacing="2">PICTOCRAFT</text>
